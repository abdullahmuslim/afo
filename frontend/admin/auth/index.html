<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>admin login</title>
  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <form method="post">
    <div class="form-field">

      <span class="loginError"></span>
      <div class="input">
        <input type="text" name="identifier" id="identifier" value="" placeholder="enter username or email" />
        <span class="instruction"></span>
      </div>
      <div class="input password">
        <input type="password" name="password" id="password" value="" placeholder="enter password" />
        <span class="instruction"></span>
        <span><img class="icon" src="./assets/hide.svg" alt="" oncontextmenu="return false;" /></span>
        <!-- forgotten password should go here -->
      </div>
      <div>
        <button type="submit" class="submit">
          <img class="loader" src="./assets/loadingMotion.svg" alt="" />
          Log In
        </button>
      </div>
      <label class="persist" for="checkbox">
        <input type="checkbox" name="checkbox" id="checkbox" />
        <p>keep me logged in</p>
      </label>
    </div>
  </form>
  <script type="module" src="./index.js"></script>
</body>

</html>
