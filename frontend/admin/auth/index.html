<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin login</title>
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <form method="post">
        <div class="form-field">
            <div>
                <input type="text" name="identifier" id="identifier" value=""
                placeholder="enter username or email" />
                <span class="instruction">username too short</span>
            </div>
            <div>
                <input type="password" name="password" id="password" value=""
                placeholder="enter password" />
                <span class="instruction">incorrect password</span>
                <!-- forgotten password should go here -->
            </div>
            <div>
                <button type="submit" class="submit">Log In</button>
            </div>
            <label class="persist" for="checkbox" >
                <input type="checkbox" name="checkbox" id="checkbox" />
                <p>keep me logged in</p>
            </label>
        </div>
    </form>
    <script src="./index.js"></script>
</body>

</html>
