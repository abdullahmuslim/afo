<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin AFO</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="user">
          <img src="./avatar.png" />
          <span>Admin</span>
        </div>
      </header>
      
      <div class="bodyContent">
        <main>
          <div class="main">
            
          </div>
        </main>
        <aside>
          <form>
            <label class="imageInput" for="filePicker">
              <p>click <span>here</span> to add an image from your device</p>
              <input class="filePicker" type="file" name="" id="filePicker" accept="image/*" alt="" />
              <p class="uploadedImage"></p>
            </label>
            <button class="imgButton" type="button">upload</button>
            <div class="cardTitles">
              <input type="text" name="" id="" value="" placeholder="product name" />
              <input type="text" name="" id="" value="" placeholder="write short and attention sparking description" />
            </div>
            <textarea class="description" name="" id="" placeholder="enter full spec details here" rows="8" cols="40"></textarea>
            <fieldset>
              <button class="reset" type="reset">clear edit</button>
              <button class="submit" type="submit">add</button>
            </fieldset>
          </form>
        </aside>
      </div>
    </aside>
    <script src="./index.js" type="module" charset="utf-8"></script>
  </body>
</html>
